services:
  bizinsight-ai:
    build: .
    ports:
      - "8501:8501"
    # Loads OPENROUTER_API_KEY (and any other secrets) from .env in the
    # project root. Using the plain string-list form for compatibility
    # with Compose versions older than 2.24.0 (which don't support the
    # path/required object syntax). The app itself raises a clear error
    # on startup if this key is missing, so an explicit `required: true`
    # here would be redundant.
    env_file:
      - .env
    volumes:
      # Named volumes (managed by Docker) instead of host bind mounts.
      # Bind mounts can cause permission errors now that the container
      # runs as a non-root user: if the host directory doesn't exist yet,
      # Docker creates it as root:root, which the container's unprivileged
      # appuser can't write to. Named volumes are created and owned
      # correctly by Docker regardless of host OS, and the Dockerfile's
      # /app/bizinsight.db -> /data/bizinsight.db symlink means the
      # database file is created automatically on first run.
      - bizinsight_data:/data
      - chroma_db:/app/chroma_db
    restart: unless-stopped

volumes:
  bizinsight_data:
  chroma_db:
  